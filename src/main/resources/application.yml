server:
  port: 8009

spring:
  application:
    name: liang-rag
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # ==================== 数据源配置 ====================
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:mysql://127.0.0.1:3306/liang_rag?rewriteBatchedStatements=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  redis:
    redisson:
      config:
        singleServerConfig: |
          address: "redis://127.0.0.1:6379"
          database: 2

  # ==================== Spring AI 配置 ====================
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-max-latest
      embedding:
        options:
          model: text-embedding-v4
    vectorstore:
      milvus:
        client:
          host: 127.0.0.1
          port: 19530
        database-name: default
        collection-name: liang_rag_vectors
        embedding-dimension: 1024
        initialize-schema: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:/mapper/**/*.xml

# ==================== MinIO 配置 ====================
storage:
  type: minio
  minio:
    endpoint: http://127.0.0.1:9000
    access-key: minioadmin
    secret-key: minioadmin

# ==================== MinerU 文档解析服务配置 ====================
mineru:
  url: http://127.0.0.1:8000
  connect-timeout: 300000
  response-timeout: 3000000

# ==================== 文档处理配置 ====================
document:
  process:
    temp-dir: ./temp/doc-process
    # 用于图片描述生成的多模态视觉模型（DashScope VL 系列）
    vision-model: qwen3-vl-plus

# ==================== RocketMQ 配置 ====================
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: liang-rag-producer-group
    send-message-timeout: 5000
    retry-times-when-send-failed: 2
